# CIC-IDS-2018 — Official attack schedule (Table 2)
# Source: https://www.unb.ca/cic/datasets/ids-2018.html
#
# Each entry describes one attack window with:
#   label         : exact label string to assign (will appear in Label column)
#   start / end   : HH:MM local time on that day
#   attacker_ips  : list of all attacker IPs (public + private)
#   victim_ips    : list of all victim IPs   (public + private)
#
# Labeling rule: a flow is labelled if
#   flow_time ∈ [start, end]
#   AND (src_ip ∈ attacker_ips OR dst_ip ∈ victim_ips
#        OR src_ip ∈ victim_ips OR dst_ip ∈ attacker_ips)
#
# Flows that dont match any window are labelled "Benign"

